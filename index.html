<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hourly Activity Display</title>

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        margin-top: 80px;
    }

    #dateHeading {
        font-size: 2rem;
        font-weight: bold;
        margin-bottom: 20px;
    }

    #activityHeading {
        font-size: 1.8rem;
        color: #0066cc;
        line-height: 1.4;
    }
</style>
</head>
<body>

<h1 id="dateHeading"></h1>
<h2 id="activityHeading"></h2>

<script>
    // One entry for each hour (0-23)
    const activities = [
        "Midnight Reflection",
        "Sleep Time",
        "Sleep Time",
        "Sleep Time",
        "Sleep Time",
        "Early Morning Stretch",
        "Breakfast",
        "Commute to Work",
        "Morning Planning",
        "Project Work",
        "Brain Games at 10.00";Hand Therapy at 10.30",
        "Exercises at 11.00",
        "Go for Lunch if hungry",
        "Nap Time",
        "Nap Time",
        "Nap Time",
        "Get ready for Horlicks and biscuits;Karthik coming at 4.45pm",
        "Commute Home",
        "Exercise Session",
        "Dinner",
        "Family Time",
        "Reading;Relaxation",
        "Prepare for Tomorrow",
        "Bedtime Routine"
    ];

    function updateDisplay() {
        const now = new Date();

        // First heading: date
        const weekday = now.toLocaleDateString('en-US', { weekday: 'long' });
        const month = now.toLocaleDateString('en-US', { month: 'long' });
        const day = now.getDate();
        const year = now.getFullYear();

        document.getElementById("dateHeading").textContent =
            `Today is ${weekday} - ${month} ${day}, ${year}`;

        // Second heading: activity based on current hour
        const hour = now.getHours(); // 0-23
        const activity = activities[hour] || "No Activity Defined";

        // Split on ';' and display each segment on its own line
        const lines = activity.split(';');
        document.getElementById("activityHeading").innerHTML =
            lines.join("<br>");
    }

    // Initial display
    updateDisplay();

    // Refresh every minute
    setInterval(updateDisplay, 60 * 1000);
</script>

</body>
</html>
